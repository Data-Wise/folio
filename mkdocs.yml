site_name: folio
site_description: "Docs-authoring toolkit for Claude Code: tutorials, guides, API docs, mermaid diagrams, doc health checks, and site management."
site_url: https://data-wise.github.io/folio/
repo_url: https://github.com/Data-Wise/folio
repo_name: Data-Wise/folio

exclude_docs: |
  # Working artifacts (SPEC/BRAINSTORM planning docs) - kept in-repo as live capture
  # targets but excluded wholesale from the published site, same convention as craft.
  specs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - content.code.copy

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - tables

nav:
  - Home: index.md
  - Commands: commands.md
  - Discovery: discovery.md
  - Generate: generate.md
  - Validate: validate.md
  - Skills & Agents: skills-agents.md
  - 📚 Cookbook:
      - Cookbook Home: cookbook/index.md
      - Recipes:
          - Find the Right Docs Command: cookbook/recipes/find-the-right-docs-command.md
          - Generate an API Reference: cookbook/recipes/generate-an-api-reference.md
          - Write a Tutorial for a New Feature: cookbook/recipes/write-a-tutorial.md
          - Check Documentation Health Before a PR: cookbook/recipes/check-docs-health-before-a-pr.md
          - Build and Preview the Docs Site: cookbook/recipes/build-and-preview-the-docs-site.md
          - Create a Mermaid Diagram from Natural Language: cookbook/recipes/create-a-mermaid-diagram.md
