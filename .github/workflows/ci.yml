name: Folio CI

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, dev ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Plugin Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml

      - name: Check required files
        run: |
          test -f .claude-plugin/plugin.json || { echo "Missing plugin.json"; exit 1; }
          test -f README.md || { echo "Missing README.md"; exit 1; }
          test -f CLAUDE.md || { echo "Missing CLAUDE.md"; exit 1; }
          echo "✅ All required files present"

      - name: Check directory structure
        run: |
          for dir in commands agents skills docs scripts tests; do
            test -d "$dir" || { echo "❌ Missing $dir/ directory"; exit 1; }
          done
          echo "✅ Directory structure OK"

      - name: Validate plugin.json schema
        run: |
          python3 -c "
          import json
          data = json.load(open('.claude-plugin/plugin.json'))
          required = ['name', 'version', 'commands', 'agents', 'skills']
          missing = [k for k in required if k not in data]
          assert not missing, f'plugin.json missing keys: {missing}'
          print('✅ plugin.json schema OK')
          "

      - name: Run structure + frontmatter tests
        run: python -m pytest tests/ -v --tb=short

      - name: Validate command/agent/skill counts
        run: bash scripts/validate-counts.sh
