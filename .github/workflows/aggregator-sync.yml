name: Aggregator Sync

# Mirrors craft's aggregator-sync.yml (parameterized: craft -> folio).
#
# PRE-REQ NOT YET SATISFIED (blocking, tracked at T2.6 in the folio-split
# ledger): Data-Wise/claude-plugins' marketplace.json has no "folio" entry
# yet. aggregator-sync.sh deliberately refuses to auto-add an unknown
# plugin (by design — adding a new plugin to the aggregator is a
# deliberate, reviewed change, not a release side effect). Add the folio
# row to Data-Wise/claude-plugins .claude-plugin/marketplace.json as its
# own reviewed PR BEFORE this workflow can succeed for real.
#
# MANUAL PRE-SHIP GATE (same as craft's) — the GitHub App installed on
# Data-Wise/claude-plugins must have contents:write, pull_requests:write,
# and admin/bypass on main. Confirm in GitHub App settings before enabling.
#
# ADMIN-MERGE NOTE (explicit user sign-off 2026-07-10): the final step
# force-merges its own PR via `gh pr merge --admin --squash`. This mirrors
# craft's own shipped pattern verbatim — Data-Wise/claude-plugins main is
# PR-required with 0 reviewers, so --admin is the only way ANY automation
# (not just this one) can merge there. The FAIL LOUD verified-merge check
# below is the safety net: if the merge doesn't actually land, this job fails.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  aggregator-sync:
    name: Sync folio version into Data-Wise/claude-plugins aggregator
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Syncing aggregator for folio v${VERSION}"

      - name: Checkout folio (for scripts/aggregator-sync.sh)
        uses: actions/checkout@v5
        with:
          path: folio

      - name: Mint GitHub App token (for cross-repo access to claude-plugins)
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: Data-Wise
          repositories: claude-plugins

      - name: Checkout Data-Wise/claude-plugins
        uses: actions/checkout@v5
        with:
          repository: Data-Wise/claude-plugins
          token: ${{ steps.app-token.outputs.token }}
          path: claude-plugins

      - name: Run aggregator-sync.sh (--check first for no-op short-circuit)
        id: sync-check
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          AGG_FILE="claude-plugins/.claude-plugin/marketplace.json"

          CHECK_OUT=$(bash folio/scripts/aggregator-sync.sh \
            --file "$AGG_FILE" --plugin folio --version "$VERSION" --check 2>&1)
          echo "$CHECK_OUT"
          if echo "$CHECK_OUT" | grep -q "^\[current\]"; then
            echo "no-op=true" >> "$GITHUB_OUTPUT"
          else
            echo "no-op=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Short-circuit on no-op
        if: steps.sync-check.outputs.no-op == 'true'
        run: |
          echo "Aggregator already current — nothing to do."

      - name: Write version bump to aggregator
        if: steps.sync-check.outputs.no-op != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          AGG_FILE="claude-plugins/.claude-plugin/marketplace.json"
          bash folio/scripts/aggregator-sync.sh \
            --file "$AGG_FILE" --plugin folio --version "$VERSION"

      - name: Open PR and merge — FAIL LOUD if not merged
        if: steps.sync-check.outputs.no-op != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          BRANCH="automated/folio-v${VERSION}"

          cd claude-plugins
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .claude-plugin/marketplace.json
          git commit -m "chore(aggregator): bump folio to v${VERSION}"
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --repo Data-Wise/claude-plugins \
            --base main \
            --head "$BRANCH" \
            --title "chore(aggregator): bump folio to v${VERSION}" \
            --body "Automated version sync from folio release v${VERSION}.")

          echo "PR opened: $PR_URL"

          # Merge via --admin (Data-Wise/claude-plugins main is PR-required with 0 reviews).
          gh pr merge --admin --squash "$PR_URL"

          # FAIL LOUD: verify the PR actually merged — exit 1 if it did not.
          MERGED_STATE=$(gh pr view "$PR_URL" --json state -q .state)
          echo "PR state after merge attempt: $MERGED_STATE"
          if [[ "$MERGED_STATE" != "MERGED" ]]; then
            echo "ERROR: PR opened but did not merge (state=$MERGED_STATE). Failing loud." >&2
            exit 1
          fi
          echo "Aggregator sync complete — folio v${VERSION} merged into claude-plugins."
